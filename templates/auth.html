<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if mode == 'login' %}Sign In{% else %}Create Account{% endif %} — PDF to CBT</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', sans-serif;
            background: #0a0a0f;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* Animated background */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(ellipse 80% 50% at 20% 40%, rgba(99, 102, 241, 0.15) 0%, transparent 60%),
                radial-gradient(ellipse 60% 40% at 80% 70%, rgba(139, 92, 246, 0.10) 0%, transparent 60%);
            z-index: 0;
            animation: bgPulse 8s ease-in-out infinite alternate;
        }
        @keyframes bgPulse {
            from { opacity: 0.7; }
            to   { opacity: 1; }
        }

        .card {
            position: relative;
            z-index: 1;
            width: 420px;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 20px;
            padding: 48px 40px;
            backdrop-filter: blur(20px);
            box-shadow: 0 32px 64px rgba(0,0,0,0.5);
            animation: slideUp 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        @keyframes slideUp {
            from { transform: translateY(30px); opacity: 0; }
            to   { transform: translateY(0);   opacity: 1; }
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 32px;
        }
        .logo-icon {
            width: 40px; height: 40px;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            font-size: 18px;
        }
        .logo-text { font-size: 18px; font-weight: 700; color: #e2e8f0; }

        h1 {
            font-size: 24px; font-weight: 700;
            color: #f1f5f9;
            margin-bottom: 6px;
        }
        .subtitle {
            font-size: 14px; color: #64748b;
            margin-bottom: 32px;
        }

        .form-group { margin-bottom: 20px; }
        label {
            display: block;
            font-size: 13px; font-weight: 500;
            color: #94a3b8;
            margin-bottom: 8px;
            letter-spacing: 0.4px;
        }
        input {
            width: 100%;
            padding: 12px 16px;
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px;
            color: #f1f5f9;
            font-size: 15px;
            font-family: inherit;
            transition: all 0.2s;
            outline: none;
        }
        input:focus {
            border-color: #6366f1;
            background: rgba(99,102,241,0.08);
            box-shadow: 0 0 0 3px rgba(99,102,241,0.15);
        }
        input::placeholder { color: #475569; }

        .btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            border: none;
            border-radius: 10px;
            color: white;
            font-size: 15px;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 8px;
            position: relative;
            overflow: hidden;
        }
        .btn:hover { transform: translateY(-1px); box-shadow: 0 8px 24px rgba(99,102,241,0.4); }
        .btn:active { transform: translateY(0); }
        .btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

        .divider {
            text-align: center;
            margin: 24px 0;
            color: #475569;
            font-size: 13px;
            position: relative;
        }
        .divider::before, .divider::after {
            content: '';
            position: absolute;
            top: 50%; height: 1px;
            background: rgba(255,255,255,0.06);
            width: calc(50% - 30px);
        }
        .divider::before { left: 0; }
        .divider::after { right: 0; }

        .switch-link {
            text-align: center;
            font-size: 14px;
            color: #64748b;
        }
        .switch-link a {
            color: #818cf8;
            text-decoration: none;
            font-weight: 500;
        }
        .switch-link a:hover { color: #a5b4fc; }

        .error-msg {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            border-radius: 8px;
            padding: 10px 14px;
            color: #fca5a5;
            font-size: 13px;
            margin-bottom: 20px;
            display: none;
        }
        .error-msg.show { display: block; }

        .spinner {
            display: inline-block;
            width: 16px; height: 16px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            vertical-align: middle;
            margin-right: 6px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .free-badge {
            display: inline-flex; align-items: center; gap: 6px;
            background: rgba(34,197,94,0.1);
            border: 1px solid rgba(34,197,94,0.2);
            border-radius: 20px;
            padding: 4px 12px;
            font-size: 12px; color: #4ade80;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo">
            <div class="logo-icon">📄</div>
            <span class="logo-text">PDF to CBT</span>
        </div>

        {% if mode == 'register' %}
        <div class="free-badge">✨ 100% Free Forever</div>
        <h1>Create your account</h1>
        <p class="subtitle">Turn any PDF question paper into an interactive test</p>

        <div class="error-msg" id="errorMsg"></div>

        <div class="form-group">
            <label>Your Name</label>
            <input type="text" id="name" placeholder="Rahul Sharma" autocomplete="name" />
        </div>
        <div class="form-group">
            <label>Email Address</label>
            <input type="email" id="email" placeholder="rahul@example.com" autocomplete="email" />
        </div>
        <div class="form-group">
            <label>Password</label>
            <input type="password" id="password" placeholder="Minimum 6 characters" autocomplete="new-password" />
        </div>
        <button class="btn" id="submitBtn" onclick="handleRegister()">Create Free Account</button>
        <div class="divider">or</div>
        <div class="switch-link">Already have an account? <a href="/login">Sign in</a></div>

        {% else %}
        <h1>Welcome back</h1>
        <p class="subtitle">Sign in to access your tests and mistakes bank</p>

        <div class="error-msg" id="errorMsg"></div>

        <div class="form-group">
            <label>Email Address</label>
            <input type="email" id="email" placeholder="rahul@example.com" autocomplete="email" />
        </div>
        <div class="form-group">
            <label>Password</label>
            <input type="password" id="password" placeholder="Your password" autocomplete="current-password" />
        </div>
        <button class="btn" id="submitBtn" onclick="handleLogin()">Sign In</button>
        <div class="divider">or</div>
        <div class="switch-link">New here? <a href="/register">Create a free account</a></div>
        {% endif %}
    </div>

    <script>
        // Allow Enter key to submit
        document.addEventListener('keydown', e => {
            if (e.key === 'Enter') {
                const btn = document.getElementById('submitBtn');
                if (btn) btn.click();
            }
        });

        function showError(msg) {
            const el = document.getElementById('errorMsg');
            el.textContent = msg;
            el.classList.add('show');
        }

        function setLoading(loading) {
            const btn = document.getElementById('submitBtn');
            if (loading) {
                btn.disabled = true;
                btn.innerHTML = '<span class="spinner"></span> Please wait...';
            } else {
                btn.disabled = false;
                btn.innerHTML = btn.dataset.label || btn.innerHTML;
            }
        }

        async function handleRegister() {
            const name = document.getElementById('name').value.trim();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;

            if (!name || !email || !password) { showError('Please fill in all fields.'); return; }
            setLoading(true);
            try {
                const res = await fetch('/api/register', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({name, email, password})
                });
                const data = await res.json();
                if (data.success) { window.location.href = data.redirect || '/'; }
                else { showError(data.error || 'Registration failed.'); setLoading(false); }
            } catch(e) { showError('Network error. Please try again.'); setLoading(false); }
        }

        async function handleLogin() {
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;

            if (!email || !password) { showError('Please fill in all fields.'); return; }
            setLoading(true);
            try {
                const res = await fetch('/api/login', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({email, password})
                });
                const data = await res.json();
                if (data.success) { window.location.href = data.redirect || '/'; }
                else { showError(data.error || 'Login failed.'); setLoading(false); }
            } catch(e) { showError('Network error. Please try again.'); setLoading(false); }
        }
    </script>
</body>
</html>
